{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site_name }}{% endblock %}</title>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '{{ theme.background }}',
              foreground: '{{ theme.foreground }}',
              muted: '{{ theme.muted }}',
              border: '{{ theme.border }}',
              primary: '{{ theme.primary }}',
            }
          }
        }
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body class="bg-background text-foreground min-h-screen flex flex-col">

    <header>
        <nav class="border-b border-border">
            <div class="max-w-4xl mx-auto px-4 py-3 flex items-center gap-6">
                <a href="/" class="font-semibold text-primary hover:opacity-75 transition-opacity">{{ site_name }}</a>
                <div class="flex gap-4 ml-4">
                    <a href="#" class="text-muted hover:text-foreground transition-colors">Blog</a>
                    <a href="#" class="text-muted hover:text-foreground transition-colors">About</a>
                </div>
            </div>
        </nav>
    </header>

    {% block banner %}{% endblock %}

    <main class="max-w-4xl mx-auto px-4 py-8 w-full flex-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-border mt-auto">
        <div class="max-w-4xl mx-auto px-4 py-6">
            {% block footer %}
            <p class="text-center text-muted text-sm">&copy; {{ site_name }}</p>
            {% endblock %}
        </div>
    </footer>

</body>
</html>
